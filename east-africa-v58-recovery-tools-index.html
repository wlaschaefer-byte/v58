function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}

function card(o){const payload=esc(JSON.stringify(o));const title=o.name||o.title;const meta=o.price||o.cost||o.date||'Info';const extra=(o.tags||[]).slice(0,3);return `<article class="card compact-card click" data-detail="${payload}"><div class="cardbody"><div class="card-main"><h3>${esc(title)}</h3></div><div class="meta-line"><span class="tag">${esc(meta)}</span>${tags(extra)}</div><p class="muted">${esc(o.desc||o.text||'')}</p><div class="row card-actions"><button class="btn primary" data-detail="${payload}">Details</button><button class="btn" data-search="${encodeURIComponent(title)}">Suche</button><button class="btn ghost">♡</button><button class="btn ghost">＋ To-Do</button></div></div></article>`}
